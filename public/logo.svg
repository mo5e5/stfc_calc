<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050c18"/>
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)" rx="88"/>

  <!-- Outer hexagon (pointy-top, radius 215) -->
  <polygon
    points="256,41 442.2,148.5 442.2,363.5 256,471 69.8,363.5 69.8,148.5"
    fill="none" stroke="#00c8ff" stroke-width="5" opacity="0.85"/>

  <!-- Tick marks at each outer hex vertex -->
  <line x1="256" y1="41"   x2="256" y2="62"   stroke="#00c8ff" stroke-width="3" opacity="0.9"/>
  <line x1="442.2" y1="148.5" x2="423.9" y2="159.1" stroke="#00c8ff" stroke-width="3" opacity="0.9"/>
  <line x1="442.2" y1="363.5" x2="423.9" y2="352.9" stroke="#00c8ff" stroke-width="3" opacity="0.9"/>
  <line x1="256" y1="471"  x2="256" y2="450"  stroke="#00c8ff" stroke-width="3" opacity="0.9"/>
  <line x1="69.8"  y1="363.5" x2="88.1"  y2="352.9" stroke="#00c8ff" stroke-width="3" opacity="0.9"/>
  <line x1="69.8"  y1="148.5" x2="88.1"  y2="159.1" stroke="#00c8ff" stroke-width="3" opacity="0.9"/>

  <!-- Three hex-axis lines (tactical grid) -->
  <line x1="256"   y1="41"   x2="256"   y2="471"   stroke="#00c8ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="69.8"  y1="148.5" x2="442.2" y2="363.5" stroke="#00c8ff" stroke-width="1.5" opacity="0.25"/>
  <line x1="442.2" y1="148.5" x2="69.8"  y2="363.5" stroke="#00c8ff" stroke-width="1.5" opacity="0.25"/>

  <!-- Inner hexagon (radius 112) -->
  <polygon
    points="256,144 353,200 353,312 256,368 159,312 159,200"
    fill="none" stroke="#00c8ff" stroke-width="3" opacity="0.55"/>

  <!-- Small gap arcs suggestion: corner dots on inner hex -->
  <circle cx="256"  cy="144" r="4" fill="#00c8ff" opacity="0.7"/>
  <circle cx="353"  cy="200" r="4" fill="#00c8ff" opacity="0.7"/>
  <circle cx="353"  cy="312" r="4" fill="#00c8ff" opacity="0.7"/>
  <circle cx="256"  cy="368" r="4" fill="#00c8ff" opacity="0.7"/>
  <circle cx="159"  cy="312" r="4" fill="#00c8ff" opacity="0.7"/>
  <circle cx="159"  cy="200" r="4" fill="#00c8ff" opacity="0.7"/>

  <!-- Center diamond (reticle) -->
  <polygon
    points="256,210 302,256 256,302 210,256"
    fill="none" stroke="#00c8ff" stroke-width="4" opacity="1" filter="url(#glow)"/>

  <!-- Diagonal cross inside diamond -->
  <line x1="256" y1="210" x2="256" y2="302" stroke="#00c8ff" stroke-width="1.5" opacity="0.45"/>
  <line x1="210" y1="256" x2="302" y2="256" stroke="#00c8ff" stroke-width="1.5" opacity="0.45"/>

  <!-- Center bright core -->
  <circle cx="256" cy="256" r="14" fill="#00c8ff" opacity="0.15" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="6"  fill="#00c8ff" opacity="1"    filter="url(#glow)"/>
  <circle cx="256" cy="256" r="3"  fill="#ffffff" opacity="0.95"/>
</svg>
